                        return gradient;
                    },
                    borderWidth: 2,
                    fill: true,
                    tension: 0.1,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false }, ticks: { maxTicksLimit: 6 } },
                    y: { 
                        grid: { color: 'rgba(0,0,0,0.05)' },
                        ticks: { callback: (v) => v + '%' }
                    }
                }
            }
        });
    </script>
</body>
